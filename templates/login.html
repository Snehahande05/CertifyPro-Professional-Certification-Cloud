<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CertifyPro Cloud</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-bg">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="login-card">
            <!-- Brand -->
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-3 p-3 mb-3 shadow">
                    <i class="fa-solid fa-shield-halved fa-2x text-info"></i>
                </div>
                <h3 class="fw-bold text-dark mb-1">CertifyPro</h3>
                <p class="text-muted small">Professional Certification Cloud</p>
            </div>
            
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} py-2 px-3 small alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="padding: 0.75rem 1rem;"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Form -->
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-semibold text-muted">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control bg-light border-start-0 ps-0" id="username" name="username" placeholder="Enter username" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label small fw-semibold text-muted">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2.5 fw-semibold mb-3">Sign In</button>
            </form>
            
            <hr class="text-muted my-4">

            <!-- Demo Credentials Helper -->
            <div class="bg-light rounded p-3">
                <div class="fw-semibold text-dark small mb-2"><i class="fa-solid fa-key text-warning me-1"></i> Demo Login Accounts:</div>
                <div class="d-flex flex-column gap-2 small">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted">Admin:</span>
                        <button class="btn btn-xs btn-outline-secondary py-0 px-2 fw-medium" style="font-size: 0.75rem;" onclick="setCreds('admin', 'admin123')">Use Admin</button>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted">Manager:</span>
                        <button class="btn btn-xs btn-outline-secondary py-0 px-2 fw-medium" style="font-size: 0.75rem;" onclick="setCreds('manager', 'manager123')">Use Manager</button>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted">Staff:</span>
                        <button class="btn btn-xs btn-outline-secondary py-0 px-2 fw-medium" style="font-size: 0.75rem;" onclick="setCreds('staff', 'staff123')">Use Staff</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setCreds(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
        }

        function applyTheme(theme) {
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add(theme);
            localStorage.setItem('certifyproTheme', theme);
        }

        document.addEventListener('DOMContentLoaded', function () {
            const storedTheme = localStorage.getItem('certifyproTheme') || 'theme-light';
            applyTheme(storedTheme);
        });
    </script>
</body>
</html>
